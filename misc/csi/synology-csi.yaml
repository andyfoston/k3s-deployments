apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: synology-csi
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/andyfoston/k3s-deployments
    targetRevision: HEAD
    path: misc/csi
  destination:
    server: "https://kubernetes.default.svc"
    namespace: csi
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
