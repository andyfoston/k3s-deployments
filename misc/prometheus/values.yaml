alertmanager:
  alertmanagerSpec:
    # Replicas for high availability (optional)
    replicas: 1
    secrets:
      - pushover-credentials
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['namespace', 'alertname']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'pushover-notifications'
      routes:
        - receiver: 'null'
          matchers:
            - alertname = "Watchdog"
        - receiver: 'pushover-notifications'
          matchers:
            - severity="critical"
    receivers:
      - name: 'null'
      - name: 'pushover-notifications'
        pushover_configs:
          - user_key_file: "/etc/alertmanager/secrets/pushover-credentials/user_key"
            token_file: "/etc/alertmanager/secrets/pushover-credentials/token"
            send_resolved: true
            priority: '{{ if eq .Status "firing" }}1{{ else }}0{{ end }}'
            title: '{{ template "pushover.default.title" . }}'
            message: '{{ template "pushover.default.message" . }}'

grafana:
  enabled: true
prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

defaultRules:
  rules:
    kubeProxy: false
    kubeControllerManager: false
    kubeSchedulerAlerting: false
    kubeSchedulerRecording: false
