apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
  name: alertmanager-ts
  namespace: monitoring
spec:
  ingressClassName: tailscale
  rules:
  - host: alertmanager
    http:
      paths:
      - backend:
          service:
            name: kube-prometheus-stack-alertmanager
            port:
              number: 9093
        path: /
        pathType: Prefix
  tls:
  - hosts:
    - alertmanager
