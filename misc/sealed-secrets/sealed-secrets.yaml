apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/andyfoston/k3s-deployments
      targetRevision: HEAD
      path: misc/sealed-secrets
    - path: sealed-secrets
      repoURL: https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.36.6/controller.yaml
  destination:
    server: "https://kubernetes.default.svc"
    namespace: kube-system
